<div class="library-panel">
  <mat-expansion-panel>
    <mat-expansion-panel-header collapsedHeight="40px" expandedHeight="40px">
      <mat-panel-description class="games-header-desc">Games: {{ this._allGames.length }}</mat-panel-description>
    </mat-expansion-panel-header>
    <div class="mat-expansion-panel-body">
      <mat-form-field class="games-input-field" appearance="outline" subscriptSizing="dynamic">
        <mat-label>Search Games</mat-label>
        <input matInput type="text" [formControl]="filterLibraryControl">
      </mat-form-field>
      <cdk-virtual-scroll-viewport class="games-scroll" [itemSize]="this._allGames.length">
        <div class="game-cards-cont">
          @for (game of filteredLibrary; track game.name) {
            <mat-card appearance="outlined">
              <mat-card-content class="game-card">
                <div>
                  <img height="53.75" width="115" mat-card-image [alt]="`Steam library photo for ${game.name}`" [ngSrc]="`https://steamcdn-a.akamaihd.net/steam/apps/${game.appId}/header.jpg`">
                </div>
                <div class="details-cont">
                  <h6 class="details-header">Hours Played</h6>
                  <small class="details-text">Total: {{ game.playtimeForever }}</small>
                  <small class="details-text">Two Weeks: {{ game.playtime2Weeks }}</small>
                  <small class="details-text">Steam Deck: {{ game.playtimeDeckForever }}</small>
                </div>
              </mat-card-content>
            </mat-card>
          }
        </div>
      </cdk-virtual-scroll-viewport>
    </div>
  </mat-expansion-panel>
</div>
