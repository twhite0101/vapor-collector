<div class="game-btn-cont">
  @if (isWishlist) {
    <a target="_blank" [href]="storeUrl">
      <button type="button" class="game-btn">
        <img height="85.533" width="183" appImageFallback="assets/cover_not_available.png" mat-card-image [alt]="`Steam library photo for ${gameData.name}`" [ngSrc]="`https://steamcdn-a.akamaihd.net/steam/apps/${gameData.appId}/header.jpg`">
      </button>
    </a>
  }
  @else {
    <button type="button" class="game-btn">
      <img height="85.533" width="183" appImageFallback="assets/cover_not_available.png" mat-card-image [alt]="`Steam library photo for ${gameData.name}`" [ngSrc]="`https://steamcdn-a.akamaihd.net/steam/apps/${gameData.appId}/header.jpg`">
    </button>
  }
</div>
