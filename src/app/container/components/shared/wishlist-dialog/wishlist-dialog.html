@if (loading) {
  <div class="spinner-cont">
    <mat-progress-bar mode="indeterminate" />
  </div>
}
@else {
  <div class="wishlist-container gradient-background">
    <h1 class="wishlist-title title-text">Wishlist</h1>
    <div class="grid-container">
      <app-grid class="ag-grid" parentGridType="Wishlist" [parentStyle]="gridStyle" [parentData]="wishlistData" [parentColDefs]="wishlistColDefs" [autoSizeStrat]="wishlistSizeStrat" />
    </div>
  </div>
}
