@if (user) {
  <div class="nameplate-cont">
    <div class="nameplate-av-name-cont">
      <img alt="Steam user avatar" height="184" width="184" priority [ngSrc]="avatars[0]">
      <div>{{ user.displayName }}</div>
      <div [ngClass]="`fi fi-${countryCode}`"></div>
    </div>
    <div>Last Login: {{ user.lastLogoff | date: 'medium' }}</div>
    <app-steam-level [level]="user.playerLevel.playerLevel" [size]="64" />
  </div>
}
